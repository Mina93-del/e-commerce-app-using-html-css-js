<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mina-Ecommerce</title>
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="css/minaec.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="header" id="header">
        <div class="container">
            <a href="#" class="logo"><img src="./img/logo.png" alt=""></a>
            <div class="titles">
                <ul class="navbar">
                    <li><a class="active" href="#landing">Home</a></li>
                    <li><a href="#shop">Shop</a></li>
                    <li><a href="#blog">Blog</a></li>
                    <li><a href="#about">About</a></li>
                    <li><a href="#contact">Contact</a></li>
                    <li><a href="#cart" class="shop-icon"><i class="fa-solid fa-cart-shopping"></i></a></li>
                </ul>
            </div>
        </div>
    </div>
    <div class="landing" id="landing">
        <div class="container">
            <div class="text-content">
                <h4>Trade-in-offer</h4>
                <h2 class="typing">Suber value deals</h2>
                <h1> On all product</h1>
                <p>Save more with coupons & up to 70% off</p>
                <a href="#" class="butt">
                    <h4>Shop now</h4>
                </a>
            </div>
        </div>

    </div>

</html>
